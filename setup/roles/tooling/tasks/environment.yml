- name: environment >> Creating $HOME/.local/
  ansible.builtin.file:
    dest: "{{ homedir }}/.local"
    mode: 0755
    owner: "{{ username }}"
    state: directory

- name: environment >> Creating $HOME/.config/
  ansible.builtin.file:
    dest: "{{ homedir }}/.config"
    mode: 0754
    owner: "{{ username }}"
    state: directory

- name: environment >> Checking for .dotfiles in $HOME 
  ansible.builtin.stat:
    path: "{{ homedir }}/.dotfiles"
  register: dotfiles

- name: environment >> Cloning .dotfiles if not exists
  ansible.builtin.git:
    repo: "https://github.com/joaopedropsilva/.dotfiles.git"
    dest: "{{ homedir }}/.dotfiles"
  when: dotfiles.stat.exists == False

- name: environment >> Stow packages into $HOME
  ansible.builtin.shell: "cd {{ homedir }}/.dotfiles/packages && stow --adopt --dotfiles -t {{ homedir }} */"

- name: environment >> Creating /usr/local/share/fonts if not exists
  become: yes
  ansible.builtin.file:
    path: /usr/local/share/fonts
    mode: 0755
    owner: root
    state: directory

- name: environment >> Copying fonts from .dotfiles
  become: yes
  ansible.builtin.copy:
    src: "{{ homedir }}/.dotfiles/fonts/ttf"
    dest: /usr/local/share/fonts
    mode: 0755
    owner: root

- name: environment >> Updating font cache
  ansible.builtin.command: fc-cache -f 

