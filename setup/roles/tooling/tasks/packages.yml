- name: packages >> Installing core packages
  become: yes
  ansible.builtin.package:
    name:
      - git
      - github-cli
      - stow
      - tmux
      - base
      - base-devel
      - docker
      - docker-compose
      - curl
      - fzf
      - scrot
      - mono
      - httpie
      - ripgrep
      - neofetch
      - neovim
      - openssh
      - rust
      - xclip
      - tldr
      - man-db
      - zip
      - unzip
      - unrar
      - gzip
      - tar
    state: present

