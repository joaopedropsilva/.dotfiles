- name: ssh >> Creating $HOME/.ssh/
  ansible.builtin.file:
    dest: "{{ homedir }}/.ssh"
    mode: 0700
    owner: "{{ username }}"
    state: directory

- name: ssh >> Installing private member of ssh key
  ansible.builtin.copy:
    src: "{{ source_key_file }}"
    dest: "{{ dest_key_file }}"
    mode: 0600
    owner: "{{ username }}"

- name: ssh >> Installing public member of ssh key
  ansible.builtin.copy:
    src: "{{ source_key_file }}.pub"
    dest: "{{ dest_key_file }}.pub"
    mode: 0644
    owner: "{{ username }}"

