- name: core >> Installing base, base-devel
  become: yes
  ansible.builtin.package:
    name:
      - base
      - base-devel
    state: present

- name: core >> Installing docker, docker-compose 
  become: yes
  ansible.builtin.package:
    name:
      - docker
      - docker-compose
    state: present

- name: core >> Installing git, stow, tmux 
  become: yes
  ansible.builtin.package:
    name:
      - git
      - stow
      - tmux
    state: present

- name: core >> Installing curl, fzf, httpie, ripgrep, neofetch, xclip, tldr, man-db 
  become: yes
  ansible.builtin.package:
    name:
      - curl
      - fzf
      - httpie
      - ripgrep
      - neofetch
      - xclip
      - tldr
      - man-db
    state: present

- name: core >> Installing zip, unzip, unrar, gzip, tar
  become: yes
  ansible.builtin.package:
    name:
      - zip
      - unzip
      - unrar
      - gzip
      - tar
    state: present

